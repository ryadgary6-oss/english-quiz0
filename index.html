<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Quiz</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&family=Inter:wght@400;500;600;700&family=Merriweather:wght@400&display=swap" rel="stylesheet">

  <style>
    /* --- Theme Variables --- */
    :root {
      --bg: #ffffff;
      --text: #000000;
      --border: #000000;
      --hover: rgba(0, 0, 0, 0.08);
      --soft: rgba(0, 0, 0, 0.04);
      --muted: rgba(0, 0, 0, 0.55);

      /* Light Mode Lamp (Off State) */
      --lamp-glass: rgba(0, 0, 0, 0.03);
      --lamp-stroke: #000000;
      --lamp-metal: #000000;
      --lamp-filament: #888888;
      --lamp-glow: rgba(255, 214, 92, 0);
      --lamp-core: rgba(255, 214, 92, 0);
      --lamp-glow-opacity: 0;
    }

    [data-theme="dark"] {
      --bg: #000000;
      --text: #ffffff;
      --border: #ffffff;
      --hover: rgba(255, 255, 255, 0.14);
      --soft: rgba(255, 255, 255, 0.06);
      --muted: rgba(255, 255, 255, 0.7);

      /* Dark Mode Lamp (On State) */
      --lamp-glass: rgba(255, 248, 220, 0.15);
      --lamp-stroke: #ffffff;
      --lamp-metal: #ffffff;
      --lamp-filament: #ffca36;
      --lamp-glow: rgba(255, 202, 54, 0.4);
      --lamp-core: #ffca36;
      --lamp-glow-opacity: 1;
    }

    /* --- Global Styles --- */
    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), color 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow-x: hidden; /* Prevent horizontal scroll */
    }

    .container {
      width: 92%;
      max-width: 680px;
      text-align: center;
      position: relative;
      padding-top: 10px;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 48px;
      letter-spacing: 1px;
      margin-bottom: 30px;
    }

    /* --- Quiz Stage & Transitions --- */
    .quiz-stage {
      transition: opacity 0.3s ease, transform 0.3s ease; /* Smoother transition */
      opacity: 1;
      transform: translateY(0);
    }

    .quiz-stage.fade-out {
      opacity: 0;
      transform: translateY(8px); /* Slight downward movement */
    }

    .question {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      line-height: 1.5;
      margin-bottom: 35px;
      min-height: 96px; /* Fixed height to prevent layout shifts */
      word-wrap: break-word; /* Ensure long words break */
    }

    .score {
      border: 2px solid var(--border);
      display: inline-block;
      padding: 8px 22px;
      border-radius: 999px;
      margin-bottom: 25px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .score:hover {
      font-weight: 700;
      background: var(--soft);
    }

    .options {
      display: grid;
      gap: 14px;
    }

    .option {
      border: 1px solid var(--border);
      background: transparent;
      padding: 14px 18px;
      border-radius: 28px;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      transition: background 0.25s ease, transform 0.2s ease, font-weight 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
      text-align: center; /* Center text within button */
    }

    .option:hover {
      background: var(--hover);
      color: var(--text);
      font-weight: 700;
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px var(--border) inset;
    }

    .option.selected {
      background: var(--hover);
      color: var(--text);
      font-weight: 700;
      box-shadow: 0 0 0 1.5px var(--border) inset;
    }

    .option.disabled { /* Style for disabled options */
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
      box-shadow: none;
    }
    .option.correct { /* Style for correct answer */
      background: #28a745; /* Green */
      color: white;
      border-color: #28a745;
      font-weight: 700;
      box-shadow: 0 0 0 1.5px #28a745 inset;
    }
    .option.incorrect { /* Style for incorrect answer */
      background: #dc3545; /* Red */
      color: white;
      border-color: #dc3545;
      font-weight: 700;
      box-shadow: 0 0 0 1.5px #dc3545 inset;
    }

    .nav {
      margin-top: 35px;
      display: flex;
      justify-content: center;
      gap: 18px;
    }

    .nav button {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      color: var(--text);
      font-size: 22px;
      font-weight: 600;
      transition: background 0.25s ease, transform 0.2s ease, font-weight 0.2s ease, box-shadow 0.25s ease;
      display: flex; /* Use flex to center content */
      justify-content: center;
      align-items: center;
    }

    .nav button:hover {
      background: var(--soft);
      font-weight: 700;
      transform: scale(1.06);
      box-shadow: 0 0 0 1px var(--border) inset;
    }

    /* --- Input Fields --- */
    input {
      width: 100%;
      padding: 13px 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      outline: none;
      transition: background 0.25s ease, border-color 0.25s ease, font-weight 0.2s ease;
    }

    input:focus {
      background: var(--soft);
      border-color: var(--primary-color, var(--border)); /* Use primary color if defined, else border */
    }

    input:hover {
      font-weight: 600;
    }

    input::placeholder {
      color: var(--text);
      opacity: 0.65;
    }

    /* --- Action Button (Start/Finish) --- */
    .action-button {
      margin-top: 15px;
      padding: 12px 30px;
      font-weight: 600;
      font-size: 15px;
      border: 1px solid var(--text);
      border-radius: 12px;
      background: var(--text);
      color: var(--bg);
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, letter-spacing 0.2s ease, box-shadow 0.25s ease;
      display: inline-block; /* Allow it to sit next to other buttons if needed */
    }

    .action-button:hover {
      font-weight: 700;
      letter-spacing: 0.3px;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(127, 127, 127, 0.15);
    }

    /* --- Theme Switcher (Lamp Icon) --- */
    .theme {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
      overflow: visible;
      padding: 0;
    }

    .theme:hover {
      background: var(--soft);
      transform: scale(1.06);
      box-shadow: 0 0 0 1px var(--border) inset;
    }

    /* Outer Glow Effect around the Lamp Switch */
    .lamp-outer-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 202, 54, 0.25) 0%, rgba(255, 255, 255, 0) 70%);
      opacity: var(--lamp-glow-opacity);
      transition: opacity 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      pointer-events: none; /* Don't block clicks */
    }

    .theme svg {
      width: 34px;
      height: 34px;
      overflow: visible;
      z-index: 2; /* Ensure SVG is above the glow */
    }

    /* Lamp SVG Parts Styling */
    .lamp-bulb {
      fill: var(--lamp-glass);
      stroke: var(--lamp-stroke);
      stroke-width: 1.7;
      transition: fill 0.4s ease, stroke 0.4s ease;
    }

    .lamp-base {
      fill: none;
      stroke: var(--lamp-metal);
      stroke-width: 1.8;
      transition: stroke 0.4s ease;
    }

    .lamp-filament {
      fill: none;
      stroke: var(--lamp-filament);
      stroke-width: 1.8;
      stroke-linecap: round;
      transition: stroke 0.4s ease;
    }

    .lamp-core {
      fill: var(--lamp-core);
      transition: fill 0.4s ease;
      opacity: 0.95;
    }

    /* Real-world Flicker Animation on turning ON */
    [data-theme="dark"] .lamp-core,
    [data-theme="dark"] .lamp-filament {
      animation: bulbFlicker 0.45s ease-in-out forwards;
    }

    @keyframes bulbFlicker {
      0% { opacity: 0.2; }
      15% { opacity: 0.9; }
      30% { opacity: 0.3; }
      45% { opacity: 1; }
      70% { opacity: 0.65; }
      100% { opacity: 1; }
    }

    /* --- Loading State Spinner --- */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 40px 0;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--soft);
      border-top: 3px solid var(--text);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }

    /* --- Results Page --- */
    .result {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      margin-bottom: 20px;
    }

    #final {
      line-height: 1.8;
      font-family: 'Merriweather', serif;
    }

    button {
      -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
    }

    /* --- Media Queries for Responsiveness --- */
    @media (max-width: 600px) {
      h1 {
        font-size: 38px;
      }

      .question {
        font-size: 23px;
        min-height: 100px; /* Adjust for smaller screens */
      }

      .option {
        font-size: 16px;
      }

      .theme {
        width: 56px;
        height: 56px;
        top: 12px;
        right: 12px;
      }

      .theme svg {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Theme Switcher Button -->
  <button class="theme" onclick="toggleTheme()" id="themeBtn" aria-label="Toggle theme">
    <div class="lamp-outer-glow"></div>
    <svg viewBox="0 0 40 40" aria-hidden="true">
      <!-- SVG elements for the lamp icon -->
      <ellipse class="lamp-core" cx="20" cy="15.5" rx="5.8" ry="6.8"></ellipse>
      <path class="lamp-bulb" d="M20 4 C13.5 4 9 8.8 9 14.8 C9 18.4 10.7 21.1 13 23.3 C14.8 25.1 16.2 26.9 16.6 29 L23.4 29 C23.8 26.9 25.2 25.1 27 23.3 C29.3 21.1 31 18.4 31 14.8 C31 8.8 26.5 4 20 4 Z" />
      <path class="lamp-filament" d="M16.5 17.5 C17.5 15.5, 18.5 18.8, 20 16.8 C21.5 14.8, 22.5 18.2, 23.5 16.4" />
      <path class="lamp-filament" d="M17 20.8 L23 20.8" />
      <path class="lamp-base" d="M16.3 29 L23.7 29" />
      <path class="lamp-base" d="M16.8 31.7 L23.2 31.7" />
      <path class="lamp-base" d="M17.5 34.3 L22.5 34.3" />
      <path class="lamp-base" d="M18.4 36.5 L21.6 36.5" />
    </svg>
  </button>

  <div class="container">
    <!-- Login Screen -->
    <div id="login">
      <h1>CYBER QUIZ</h1>
      <input id="name" placeholder="Full Name" type="text">
      <input id="id" placeholder="Student ID" type="text">
      <button class="action-button" onclick="startQuiz()" id="startButton" disabled style="opacity: 0.6;">START</button>
    </div>

    <!-- Loading State -->
    <div id="loader" class="hidden">
      <div class="loader-container">
        <div class="spinner"></div>
        <div style="font-family:'Poppins',sans-serif; font-size:16px; font-weight:600; letter-spacing:0.5px;">RETRIEVING DATABASE...</div>
      </div>
    </div>

    <!-- Quiz View -->
    <div id="quiz" class="hidden">
      <div class="quiz-stage" id="quizStage">
        <div class="score" id="score">Score: 0</div>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
      </div>
      <div class="nav">
        <button onclick="prevQuestion()" aria-label="Previous question">‹</button>
        <button onclick="nextQuestion()" aria-label="Next question">›</button>
      </div>
      <!-- Finish Button added here -->
      <button class="action-button" id="finishButton" onclick="finishQuiz()" style="display: none;">FINISH</button>
    </div>

    <!-- Result Page -->
    <div id="result" class="hidden">
      <div class="result">Quiz Finished</div>
      <div id="final"></div>
      <!-- Restart button remains for a new session -->
      <button class="action-button" onclick="location.reload()">Restart</button>
    </div>
  </div>

  <!-- Background Music (Optional) -->
  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3">
    Your browser does not support the audio element.
  </audio>

  <script>
    // --- Configuration ---
    // IMPORTANT: Use the CORRECT Google Apps Script Web App URL here
    const API = "https://script.google.com/macros/s/AKfycbyN1lH5AUxo6H4c8mjRFELYKcE_0RyNLpZG_XT52y9VCA91Cz5cTAyL0kSjQ1F65Md3/exec"; // <<<--- YOUR CORRECT URL
    const SUBMISSION_API = API; // Using the same API for submission

    // --- State Variables ---
    let questions = [];
    let index = 0;
    let user = { name: "", id: "" };
    let answers = []; // Stores selected answers: [answer1, answer2, ...]
    let typingTimeout = null;
    let isSubmitting = false; // Flag to prevent multiple submissions
    let studentIdsSubmitted = new Set(); // To track submitted IDs on the client-side

    // --- Theme Toggle Function ---
    function toggleTheme() {
      const body = document.body;
      const isDark = body.getAttribute("data-theme") === "dark";

      if (isDark) {
        body.removeAttribute("data-theme");
      } else {
        body.setAttribute("data-theme", "dark");
      }
    }

    // --- Score Calculation ---
    function getScore() {
      let correctCount = 0;
      for (let i = 0; i < questions.length; i++) {
        if (questions[i] && answers[i] && answers[i] === questions[i].Answer) {
          correctCount++;
        }
      }
      return correctCount;
    }

    function updateScoreDisplay() {
      const scoreElement = document.getElementById("score");
      if (scoreElement) {
          scoreElement.innerText = "Score: " + getScore();
      }
    }

    // --- Fetch Questions ---
    async function fetchQuestions() {
      document.getElementById("login").classList.add("hidden");
      document.getElementById("loader").classList.remove("hidden");

      try {
        const response = await fetch(API);
        if (!response.ok) {
            // Handle HTTP errors
            throw new Error(`HTTP error! status: ${response.status}. URL: ${API}`);
        }
        questions = await response.json();

        if (!Array.isArray(questions) || questions.length === 0) {
            throw new Error("No questions found or invalid data format received from the API.");
        }

        // Ensure questions have the expected properties
        questions = questions.filter(q => q.Question && q.Option1 && q.Option2 && q.Option3 && q.Option4 && q.Answer);
        if (questions.length === 0) {
            throw new Error("No valid questions found after filtering.");
        }

        answers = new Array(questions.length).fill(null);

        document.getElementById("loader").classList.add("hidden");
        document.getElementById("quiz").classList.remove("hidden");

        index = 0;
        updateScoreDisplay();
        renderQuestion();

      } catch (error) {
        console.error("Error fetching questions:", error);
        // Display a user-friendly message
        alert(`Failed to load questions. Please check your connection and the API URL. Error: ${error.message}`);
        // Reset to login screen or show an error state
        document.getElementById("loader").classList.add("hidden");
        document.getElementById("login").classList.remove("hidden");
        // Optionally clear inputs or show an error message on the login screen
      }
    }

    // --- Typewriter Effect for Questions ---
    function typeWriter(text, elementId, speed = 18) {
      const el = document.getElementById(elementId);
      el.innerHTML = "";
      if (typingTimeout) clearTimeout(typingTimeout);

      let i = 0;
      function typing() {
        if (i < text.length) {
          el.innerHTML += text.charAt(i);
          i++;
          typingTimeout = setTimeout(typing, speed);
        }
      }
      typing();
    }

    // --- Render Current Question and Options ---
    function renderQuestion() {
      if (!questions || questions.length === 0) return;

      const quizStage = document.getElementById("quizStage");
      quizStage.classList.add("fade-out");

      setTimeout(() => {
        const currentQuestionData = questions[index];
        typeWriter("> " + currentQuestionData.Question, "question");

        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";

        const availableOptions = [
          currentQuestionData.Option1,
          currentQuestionData.Option2,
          currentQuestionData.Option3,
          currentQuestionData.Option4
        ].filter(opt => opt); // Remove any empty options

        shuffleArray(availableOptions); // Shuffle options

        availableOptions.forEach(optionText => {
          const button = document.createElement("button");
          button.className = "option";
          button.innerText = optionText;
          button.dataset.answer = optionText;

          if (answers[index] === optionText) {
            button.classList.add("selected");
          }

          button.onclick = () => handleAnswerSelection(button, optionText, currentQuestionData.Answer);
          optionsContainer.appendChild(button);
        });

        updateScoreDisplay();
        quizStage.classList.remove("fade-out");
      }, 300);
    }

    // --- Handle Answer Selection ---
    function handleAnswerSelection(selectedButton, selectedAnswerText, correctAnswer) {
      const allOptionButtons = document.querySelectorAll(".option");
      allOptionButtons.forEach(btn => {
          btn.classList.add("disabled"); // Disable all buttons
          btn.onclick = null; // Remove click handler
      });

      answers[index] = selectedAnswerText;
      updateScoreDisplay();

      selectedButton.classList.add("selected");
      if (selectedAnswerText === correctAnswer) {
        selectedButton.classList.add("correct");
      } else {
        selectedButton.classList.add("incorrect");
        allOptionButtons.forEach(btn => {
          if (btn.dataset.answer === correctAnswer) {
            btn.classList.add("correct"); // Highlight correct answer
          }
        });
      }

      setTimeout(() => {
        if (index < questions.length - 1) {
          index++;
          renderQuestion();
        } else {
          finishQuiz();
        }
      }, 1500);
    }

    // --- Navigation ---
    function nextQuestion() {
      if (index < questions.length - 1) {
        index++;
        renderQuestion();
      } else {
        finishQuiz(); // End quiz if at last question and 'next' is pressed
      }
    }

    function prevQuestion() {
      if (index > 0) {
        index--;
        renderQuestion();
      }
    }

    // --- Start Quiz Flow ---
    async function startQuiz() {
      user.name = document.getElementById("name").value.trim();
      user.id = document.getElementById("id").value.trim();

      if (!user.name || !user.id) {
        alert("Please enter both your Full Name and Student ID.");
        return;
      }

      // Client-side check for duplicate ID submission
      if (studentIdsSubmitted.has(user.id)) {
          alert("It seems you have already submitted the quiz with this Student ID. Please use a different ID or contact support.");
          return;
      }

      const music = document.getElementById("music");
      music.play().catch(e => console.log("Background music could not be played. Auto-play might be restricted."));

      await fetchQuestions();

      document.getElementById("finishButton").style.display = "inline-block";
    }

    // --- Finish Quiz ---
    async function finishQuiz() {
      if (isSubmitting) return;
      isSubmitting = true;

      document.getElementById("quiz").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");

      const score = getScore();
      const totalQuestions = questions.length;
      const percentage = totalQuestions > 0 ? ((score / totalQuestions) * 100).toFixed(1) : "0.0";

      let message = "";
      if (percentage < 30) message = "Maybe try reading the book once? 😅";
      else if (percentage < 60) message = "Not bad, but you're not exactly an expert yet. 😉";
      else if (percentage < 90) message = "Pretty solid! You definitely did your homework. 👏";
      else message = "Genius! Are you a professor in disguise? 🧠🔥";

      document.getElementById("final").innerHTML = `
        <div style="font-size:24px; font-family:'Poppins',sans-serif;">
          Result: ${score} / ${totalQuestions} (${percentage}%)
        </div>
        <div style="font-size:18px; margin-top:15px; font-style:italic;">
          "${message}"
        </div>
      `;

      // --- Submit results to Google Apps Script ---
      try {
        const response = await fetch(SUBMISSION_API, {
          method: "POST",
          // mode: "no-cors", // IMPORTANT: Using 'no-cors' means the response will be opaque.
                           // If your Google Apps Script handles CORS properly (e.g., using `setXFrameOptionsMode(HtmlService.XFrameOptionsMode.ALLOWALL)`
                           // and potentially returning appropriate headers), you might remove 'no-cors' for better debugging.
                           // For now, leaving it as it's common for basic GAS deployments.
          mode: "no-cors",
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: user.name,
            id: user.id,
            score: score,
            total: totalQuestions,
            percentage: percentage,
            answers: answers, // Sending the array of selected answers
            timestamp: new Date().toISOString()
          })
        });

        console.log("Submission request sent. Response status is opaque due to 'no-cors'. Server should handle it.");
        studentIdsSubmitted.add(user.id); // Add to client-side tracking set

      } catch (error) {
        console.error("Error submitting results:", error);
        alert("There was an error submitting your results. Please check your internet connection.");
      } finally {
          isSubmitting = false; // Reset flag
      }
    }

    // --- Utility Functions ---
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    // --- Event Listeners ---
    // Update start button state based on input fields
    document.addEventListener('DOMContentLoaded', () => {
        const nameInput = document.getElementById("name");
        const idInput = document.getElementById("id");
        const startButton = document.getElementById("startButton");

        function updateStartButtonState() {
            if (nameInput.value.trim() && idInput.value.trim()) {
                startButton.disabled = false;
                startButton.style.opacity = '1';
            } else {
                startButton.disabled = true;
                startButton.style.opacity = '0.6';
            }
        }

        nameInput.addEventListener("input", updateStartButtonState);
        idInput.addEventListener("input", updateStartButtonState);

        // Initialize button state on load
        updateStartButtonState();

        // Add navigation button event listeners
        document.querySelector('.nav button:nth-of-type(1)').onclick = prevQuestion;
        document.querySelector('.nav button:nth-of-type(2)').onclick = nextQuestion;
    });

  </script>

</body>
</html>
